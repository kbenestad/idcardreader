<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════════════
  idcardreader — EXTRACTOR (daily-use tool).

  One of two entry points sharing the basis chrome and assets/. This page reads
  a template (templates/*.yaml), captures a card, extracts each field via OCR /
  QR / crop, lets a human review/resolve it, then downloads an HTML record that
  re-checks expiry on every open AND wraps every value in a one-click COPY
  button for fast copy-out into a case file.

  Chrome is the unchanged basis shell; capture/extraction live in capture.js.
  ════════════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no">
<title>ID Card Reader</title>

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#2f6fed">

<script>
  (function(){var t=localStorage.getItem('kb-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
</script>

<!-- CDN libraries: js-yaml (existing) and the extraction stack. -->
<script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<!-- PDF.js is an ES module → import it and expose the global capture.js waits for. -->
<script type="module">
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.min.mjs';
  window.pdfjsLib = pdfjsLib;
</script>

<!-- Shared design + runtime (byte-identical bizdocs copies) + app-owned capture.js. -->
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/ui.css">
<script src="assets/app.js"></script>
<script src="assets/capture.js"></script>

<style>
/* ── App-specific layout (shared look stays in assets/*.css) ───────────────── */
.idc-drop {
  border: 1px dashed var(--accent-border); border-radius: var(--radius);
  background: var(--accent-soft); padding: 22px; text-align: center;
  display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.idc-drop.is-over { border-color: var(--accent); background: var(--surface-3); }
.idc-drop .hint { color: var(--text-muted); font-size: var(--fs-small); }
.idc-sides { display: flex; flex-direction: column; gap: 20px; }
.idc-preview { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); }

/* Cropper (capture.js) */
.idc-croptools { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
.idc-croptools__angle { font-size: var(--fs-sm); color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 3.5ch; text-align: center; }
.idc-stage { position: relative; display: inline-block; max-width: 100%; line-height: 0;
  background: var(--surface-3); border-radius: var(--radius-sm); touch-action: none; }
.idc-stage__img { display: block; max-width: 100%; cursor: crosshair; }
.idc-crop { position: absolute; border: 2px solid var(--accent); cursor: move; }
.idc-crop-mask { position: absolute; inset: 0; background: rgba(20,24,30,.45); pointer-events: none; }
.idc-crop__h { position: absolute; width: 12px; height: 12px; background: var(--accent);
  border: 2px solid #fff; border-radius: 50%; }
.idc-crop__h--nw { left: -7px; top: -7px; cursor: nwse-resize; }
.idc-crop__h--ne { right: -7px; top: -7px; cursor: nesw-resize; }
.idc-crop__h--sw { left: -7px; bottom: -7px; cursor: nesw-resize; }
.idc-crop__h--se { right: -7px; bottom: -7px; cursor: nwse-resize; }
.idc-crop__h--n { left: 50%; top: -7px; transform: translateX(-50%); cursor: ns-resize; }
.idc-crop__h--s { left: 50%; bottom: -7px; transform: translateX(-50%); cursor: ns-resize; }
.idc-crop__h--w { left: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
.idc-crop__h--e { right: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
.idc-stage { overflow: visible; }
.idc-align-guide { position: absolute; border: 2px dashed var(--warning); background: rgba(201,133,31,.10);
  pointer-events: none; box-sizing: border-box; }
.idc-align-guide--2 { border-color: var(--info); background: rgba(47,111,237,.10); }
.idc-align-guide__tag { position: absolute; top: 2px; left: 2px; font-size: 10px; line-height: 1.5;
  background: rgba(160,95,0,.82); color: #fff; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
.idc-align-guide--2 .idc-align-guide__tag { background: rgba(30,75,180,.82); }

.idc-thumbs { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.idc-thumb { border: 2px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 4px; cursor: pointer; background: var(--surface); }
.idc-thumb:hover { border-color: var(--accent); }
.idc-thumb img { display: block; max-height: 150px; }
.idc-thumb .n { text-align: center; font-size: var(--fs-small); color: var(--text-muted); }

/* Review rows */
.idc-fieldrow { display: grid; grid-template-columns: 120px 1fr auto; gap: 14px;
  align-items: start; padding: 12px 0; border-top: 1px solid var(--border); }
.idc-fieldrow:first-of-type { border-top: 0; }
.idc-fieldrow.is-conflict { background: var(--warning-soft); border-radius: var(--radius-sm);
  padding: 12px; border-top: 0; margin: 6px 0; }
@media (max-width: 640px){ .idc-fieldrow { grid-template-columns: 1fr; } }
.idc-regimg { width: 120px; max-height: 80px; object-fit: contain; border: 1px solid var(--border);
  border-radius: 4px; background: var(--surface-3); }
.idc-photoimg { width: 100%; max-height: 360px; object-fit: contain; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-3); }
.idc-fieldrow.idc-photorow { grid-template-columns: minmax(180px, 35%) 1fr auto; }
.idc-lightbox { position: fixed; inset: 0; background: rgba(10,12,16,.82); z-index: 10000;
  display: flex; align-items: center; justify-content: center; padding: 24px; cursor: zoom-out; }
.idc-lightbox img { max-width: 96vw; max-height: 92vh; border-radius: 6px; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
.idc-lightbox .cap { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; color: #fff; font-size: 13px; }
.idc-flabel { font-size: var(--fs-label); font-weight: 600; text-transform: uppercase;
  letter-spacing: .03em; color: var(--text-muted); }
.idc-review { display: inline-flex; align-items: center; gap: 6px; font-size: var(--fs-small);
  color: var(--text-muted); cursor: pointer; white-space: nowrap; user-select: none; }
.idc-review .mark { font-weight: 700; }
.idc-review.is-ok .mark { color: var(--success); }
.idc-review.is-no .mark { color: var(--danger); }
.idc-cand { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
.idc-cand .kb-btn { flex-direction: column; align-items: flex-start; gap: 2px; text-align: left; }
.idc-cand .src { font-size: 10px; opacity: .7; text-transform: uppercase; }
.idc-rawqr { font-family: var(--font-mono); font-size: 12px; word-break: break-all;
  background: var(--surface-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
.idc-muted { color: var(--text-muted); font-size: var(--fs-small); }
.idc-busy { text-align: center; padding: 30px; color: var(--text-muted); }
</style>
</head>
<body>
<div id="app"><p class="kb-loading">Loading configuration…</p></div>

<script>
(async function () {
'use strict';

let CFG;
let lang = 'en';
const S = (key, vars) => lookupString(CFG['ui-strings'], key, lang, CFG['default-code'], vars);

function normaliseConfig() {
  const loc = CFG && CFG.localisation;
  if (!loc) return;
  const { table, languages, defaultCode } = buildLangTable(loc);
  CFG['default-code'] = defaultCode;
  CFG.languages = CFG.languages || languages;
  CFG['ui-strings'] = table;
}

/* Fail loudly if config.yml didn't parse to a real config object. The classic
 * cause is a static host (or stale cache) returning an HTML page for
 * config.yml, which YAML parses as a plain string — leaving no localisation
 * block, so the UI would otherwise render every label as a raw key with an
 * empty language picker. Surface that instead of degrading silently. */
function assertConfig(cfg) {
  if (cfg && typeof cfg === 'object' && cfg.localisation) return;
  const got = (typeof cfg === 'string' && /^\s*</.test(cfg))
    ? 'an HTML page (a 404 / fallback response?)' : ('parsed type "' + typeof cfg + '"');
  throw new Error('config.yml has no localisation block — got ' + got + '. Make sure config.yml '
    + 'sits next to this page and is served as a static file over HTTP. If you just updated it, '
    + 'hard-refresh to clear a cached copy (Ctrl/Cmd+Shift+R).');
}
function applyLang(lc) {
  lang = lc;
  const loc = CFG.localisation || {};
  const a = (loc[lc] && loc[lc].about) || (loc[CFG['default-code']] && loc[CFG['default-code']].about) || {};
  CFG['about-title'] = a.title || 'About';
  CFG['about-content'] = a.content || '';
  CFG['about-button'] = a.button || 'Close';
}
const showAboutModal = () => kbAbout({ title: CFG['about-title'], contentMD: CFG['about-content'], closeLabel: CFG['about-button'] });

/* ── Chrome (unchanged basis shell) ──────────────────────────────────────── */
function buildToolbar() {
  const toolbar = el('div', { className: 'kb-toolbar' });
  const langSel = el('select', { className: 'kb-select', 'aria-label': 'Language' });
  (CFG.languages || []).forEach(l => {
    const o = el('option', { value: l.code }, l.name || l.code);
    if (l.code === lang) o.selected = true; langSel.appendChild(o);
  });
  langSel.addEventListener('change', () => { applyLang(langSel.value); localStorage.setItem('idc-lang', langSel.value); render(); });
  const { seg, label } = makeSizeControl();
  toolbar.append(langSel, el('div', { className: 'spacer' }), seg, label, makeThemeButton(), makeAboutButton(showAboutModal));
  return toolbar;
}
function buildHeader() {
  const header = el('header', { className: 'kb-header' });
  const brand = el('div', { className: 'kb-brand' });
  const tile = el('span', { className: 'logo' });
  if (CFG.logo === 'yes' || CFG.logo === true) {
    const img = el('img', { src: 'assets/logo.png', alt: CFG.organization || '' });
    img.onerror = () => { img.src = 'assets/logo.jpg'; img.onerror = () => { tile.innerHTML = KB_BRAND_SVG; }; };
    tile.appendChild(img);
  } else { tile.innerHTML = KB_BRAND_SVG; }
  const org = el('span', { className: 'org' });
  org.appendChild(document.createTextNode(CFG.organization || 'kbenestad/idcardreader'));
  const small = el('small'); small.textContent = CFG.tagline || S('subtitle');
  org.appendChild(small); brand.append(tile, org);
  const title = el('div', { className: 'kb-doctitle' });
  title.appendChild(el('h1', null, S('app-title-extract')));
  header.append(brand, title);
  return header;
}
function buildFooter() {
  const sep = () => el('span', { className: 'sep' }, '·');
  const footer = el('footer', { className: 'kb-footer' });
  const mark = el('span', { className: 'kb-mark' }); mark.innerHTML = KB_FOOTER_MARK_SVG + 'kBenestad';
  footer.append(mark,
    sep(), el('span', null, '© 2026 Kristian Benestad'),
    sep(), el('a', { href: 'template.html' }, S('app-title-builder')),
    sep(), el('button', { type: 'button', onClick: showAboutModal }, CFG['about-title'] || 'About'));
  return footer;
}
function field(label, input) {
  const f = el('div', { className: 'kb-field' });
  f.append(el('span', { className: 'kb-label' }, label), input);
  return f;
}

/* ── State ───────────────────────────────────────────────────────────────── */
let manifest = [], templateList = [], templateErrors = [];
let tpl = null;                                   // selected template
const sideCanvas = { front: null, back: null };   // finalized working images
let results = null;                                // array of field result objects
const rawQr = { front: null, back: null };         // raw decoded QR per side
const rawMrz = { front: null, back: null };        // raw OCR'd MRZ lines per side
let validationAttempted = false;
let busy = false;

function resetExtraction() {
  results = null; validationAttempted = false;
  rawQr.front = rawQr.back = null; rawMrz.front = rawMrz.back = null;
}

/* ── Render ──────────────────────────────────────────────────────────────── */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const wrap = el('div', { className: 'kb-wrap' });
  wrap.append(buildToolbar(), buildHeader());
  wrap.appendChild(buildDocTypeCard());
  if (tpl) {
    wrap.appendChild(buildCaptureCard());
    if (results) wrap.appendChild(buildReviewCard());
  }
  wrap.appendChild(buildFooter());
  app.appendChild(wrap);
  updateThemeIcon();
}

function buildDocTypeCard() {
  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('doc-type-label')));
  if (templateErrors.length) {
    const note = el('div', { className: 'kb-note kb-note--warning' });
    const body = el('div');
    body.appendChild(el('b', null, S('templates-skipped')));
    const ul = el('ul');
    templateErrors.forEach(msg => ul.appendChild(el('li', null, msg)));
    body.appendChild(ul);
    note.append(el('span', null, '⚠'), body);
    card.appendChild(note);
  }
  if (!templateList.length) { card.appendChild(el('p', { className: 'idc-muted' }, S('no-templates'))); return card; }
  const sel = el('select', { className: 'kb-select' });
  sel.appendChild(el('option', { value: '' }, S('doc-type-placeholder')));
  templateList.forEach(t => { const o = el('option', { value: t.slug }, t.name || t.slug); if (tpl && tpl.slug === t.slug) o.selected = true; sel.appendChild(o); });
  sel.addEventListener('change', () => {
    tpl = templateList.find(t => t.slug === sel.value) ? JSON.parse(JSON.stringify(templateList.find(t => t.slug === sel.value).data)) : null;
    sideCanvas.front = sideCanvas.back = null; resetExtraction(); render();
  });
  card.appendChild(sel);
  return card;
}

function buildCaptureCard() {
  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('app-title-extract')));
  const sides = el('div', { className: 'idc-sides' });
  sides.appendChild(sideBlock('front'));
  if (tpl.back) sides.appendChild(sideBlock('back'));
  else { const n = el('div'); n.appendChild(el('p', { className: 'idc-muted' }, S('no-back-note'))); sides.appendChild(n); }
  card.appendChild(sides);

  const needBack = !!tpl.back;
  const ready = sideCanvas.front && (!needBack || sideCanvas.back);
  const bar = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const extractBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: runExtraction }, S('btn-extract'));
  extractBtn.disabled = !ready || busy;
  bar.appendChild(extractBtn);
  if (busy) bar.appendChild(el('span', { className: 'idc-muted' }, S('extracting')));
  card.appendChild(bar);
  return card;
}

function sideBlock(side) {
  const box = el('div');
  box.appendChild(el('div', { className: 'idc-flabel', style: { marginBottom: '6px' } }, S(side === 'front' ? 'step-front' : 'step-back')));
  const host = el('div');
  box.appendChild(host);
  if (sideCanvas[side]) {
    host.appendChild(el('img', { className: 'idc-preview', src: canvasToDataURL(sideCanvas[side], 'image/jpeg', 0.8) }));
    host.appendChild(el('div', { className: 'kb-actbar', style: { marginTop: '8px' } },
      el('button', { className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: () => { sideCanvas[side] = null; resetExtraction(); render(); } }, S('recapture'))));
  } else {
    mountCapture(host, side, () => { resetExtraction(); render(); });
  }
  return box;
}

/* Upload → page-pick → crop/rotate → store finalized side canvas. */
function mountCapture(host, side, onDone) {
  host.innerHTML = '';
  const drop = el('div', { className: 'idc-drop' });
  drop.appendChild(el('div', { className: 'hint' }, S('capture-hint')));
  const fileInput = el('input', { type: 'file', accept: 'image/*,application/pdf', style: { display: 'none' } });
  drop.append(el('button', { className: 'kb-btn kb-btn--primary', onClick: () => fileInput.click() }, S('btn-upload')), fileInput);
  host.appendChild(drop);
  const work = el('div', { style: { marginTop: '10px' } });
  host.appendChild(work);

  ['dragover', 'dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault();
    if (ev === 'dragover') drop.classList.add('is-over'); else drop.classList.remove('is-over');
    if (ev === 'drop' && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  }));
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  async function handleFile(file) {
    work.innerHTML = '<p class="idc-muted">…</p>';
    let cap;
    try { cap = await captureToImage(file); }
    catch (e) { work.innerHTML = ''; work.appendChild(noteErr(e.message)); return; }
    if (cap.isPdf && cap.pageCount > 1) showPagePicker(cap); else showCropper(cap.canvas);
  }
  function showPagePicker(cap) {
    work.innerHTML = '';
    work.appendChild(el('p', { className: 'idc-muted' }, S('pick-page')));
    const thumbs = el('div', { className: 'idc-thumbs' });
    cap.thumbnails.forEach(t => {
      const cell = el('div', { className: 'idc-thumb', onClick: async () => { work.innerHTML = '<p class="idc-muted">…</p>'; showCropper(await cap.pickPage(t.page)); } });
      cell.append(el('img', { src: t.dataUrl }), el('div', { className: 'n' }, String(t.page)));
      thumbs.appendChild(cell);
    });
    work.appendChild(thumbs);
  }
  function showCropper(canvas) {
    work.innerHTML = '';
    const cropHost = el('div'); work.appendChild(cropHost);
    // Support new array format (alignment-fields) and legacy single-object format (alignment-field).
    const afList = tpl['alignment-fields'] || (tpl['alignment-field'] ? [tpl['alignment-field']] : []);
    const alignmentRegions = afList.filter(af => af && af.side === side).map(af => {
      const sideObj = tpl[side];
      const afField = sideObj && (sideObj.fields || []).find(f => f.id === af.id);
      return afField ? Object.assign({}, afField.region, { label: afField.label || afField.id }) : null;
    }).filter(Boolean);
    const ctl = attachCropRotate(canvas, cropHost, { aspect: aspectRatioFor(tpl.aspect), allowOverflow: true, alignmentRegions });
    work.appendChild(el('div', { className: 'kb-actbar', style: { marginTop: '12px' } },
      el('button', { className: 'kb-btn kb-btn--primary', onClick: () => { sideCanvas[side] = ctl.getResult(); ctl.destroy(); onDone(); } }, S('use-this-image'))));
  }
}

/* ── Extraction ──────────────────────────────────────────────────────────── */
async function runExtraction() {
  busy = true; render();
  const ocrLang = tpl['ocr-language'] || CFG['ocr-language'] || 'eng';
  const out = [];

  // Pass 1: decode every QR field across ALL sides and merge into one payload.
  // A QR on the back can supply keys for fields on the front, and vice versa.
  let mergedPayload = null;
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !sideCanvas[side]) continue;
    const sideObj = tpl[side];
    for (const f of sideObj.fields.filter(f => f.type === 'qr')) {
      const crop = cropRegion(sideCanvas[side], f.region);
      const raw = decodeQr(crop);
      rawQr[side] = raw;
      if (raw && sideObj['qr-parse']) {
        const parsed = parseQrPayload(raw, sideObj['qr-parse']);
        if (parsed) mergedPayload = Object.assign(mergedPayload || {}, parsed);
      }
    }
  }

  // Pass 1b: OCR + parse every MRZ field across ALL sides and merge into one
  // payload, same shape as the QR pass above. MRZ-linked fields (below) trust
  // this payload alone — they are never separately OCR'd, since a passport's
  // visible bio-data layout varies far too much by issuing country to template
  // generically, whereas the MRZ format itself (TD3) is fixed by ICAO 9303.
  let mergedMrz = null;
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !sideCanvas[side]) continue;
    const sideObj = tpl[side];
    for (const f of sideObj.fields.filter(f => f.type === 'mrz')) {
      const crop = cropRegion(sideCanvas[side], f.region);
      const raw = await ocrMrz(crop);
      rawMrz[side] = raw;
      const parsed = parseMrzTd3(raw);
      if (parsed) mergedMrz = Object.assign(mergedMrz || {}, parsed);
    }
  }

  // Pass 2: extract all fields using the merged cross-side payloads.
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !sideCanvas[side]) continue;
    const sideObj = tpl[side];
    for (const f of sideObj.fields) {
      const crop = cropRegion(sideCanvas[side], f.region);
      const r = {
        id: f.id, label: f.label || f.id, type: f.type, side, calendar: f.calendar || 'gregorian',
        regionDataUrl: crop.toDataURL('image/jpeg', 0.8),
        ocrValue: '', qrValue: '', value: '', dateText: '',
        conflict: false, resolved: true, reviewed: false, photoDataUrl: null,
      };
      if (f.type === 'photo') {
        r.photoDataUrl = crop.toDataURL('image/jpeg', 0.85);
        r.value = '';
      } else if (f.type === 'qr') {
        r.value = rawQr[side] || '';
      } else if (f.type === 'mrz') {
        r.value = rawMrz[side] || '';
      } else if (f['mrz-key']) {
        r.value = mrzFieldValue(mergedMrz, f['mrz-key']);
      } else {
        r.ocrValue = await ocrField(crop, ocrLang);
        if (f.type === 'date' && r.ocrValue) {
          r.dateText = r.ocrValue;
          r.value = normaliseDate(r.ocrValue, r.calendar) || r.ocrValue;
        } else {
          r.value = r.ocrValue;
        }
        if (f['qr-key'] && mergedPayload && mergedPayload[f['qr-key']] != null) {
          r.qrValue = mergedPayload[f['qr-key']];
          if (r.qrValue && conflictBetween(r.ocrValue, r.qrValue, r.type, r.calendar)) {
            r.conflict = true; r.resolved = false; r.value = '';
          } else if (r.qrValue && !r.ocrValue) {
            r.value = r.qrValue;
          }
        }
      }
      out.push(r);
    }
  }
  results = out; busy = false; render();
  const review = document.getElementById('idc-review-card');
  if (review) review.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Look up an `mrz-key` in the merged MRZ payload. Check-digit results are
// booleans in that payload (e.g. compositeValid) — render those as a plain
// OK/MISMATCH string rather than "true"/"false".
function mrzFieldValue(mergedMrz, key) {
  if (!mergedMrz || mergedMrz[key] == null) return '';
  const v = mergedMrz[key];
  return typeof v === 'boolean' ? (v ? 'OK' : 'MISMATCH') : String(v);
}

function normForCompare(s) { return String(s || '').replace(/\s+/g, '').toLowerCase(); }
function conflictBetween(ocr, qr, type, calendar) {
  if (type === 'date') {
    const a = normaliseDate(ocr, calendar), b = normaliseDate(qr, calendar);
    if (a && b) return a !== b;
    return normForCompare(ocr) !== normForCompare(qr);
  }
  return normForCompare(ocr) !== normForCompare(qr);
}

/* ── Review screen ───────────────────────────────────────────────────────── */
function buildReviewCard() {
  const card = el('div', { className: 'kb-card', id: 'idc-review-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('section-review')));

  results.forEach((r, i) => card.appendChild(reviewRow(r, i)));

  // raw QR payload(s) for audit
  ['front', 'back'].forEach(side => {
    if (rawQr[side]) {
      card.appendChild(el('div', { className: 'idc-flabel', style: { marginTop: '14px', marginBottom: '4px' } }, S('raw-qr-label') + ' · ' + S(side === 'front' ? 'step-front' : 'step-back')));
      card.appendChild(el('div', { className: 'idc-rawqr' }, rawQr[side]));
    }
  });

  const unresolved = results.filter(r => r.conflict && !r.resolved).length;
  const unreviewed = results.filter(r => !r.reviewed).length;
  const ready = validationAttempted && unresolved === 0 && unreviewed === 0;
  const gate = el('div', { style: { marginTop: '16px' } });
  if (unresolved > 0) {
    const n = el('div', { className: 'kb-note kb-note--warning' });
    n.innerHTML = '<span>⚠</span><div>' + S('gate-note') + '</div>';
    gate.appendChild(n);
  }
  const actions = el('div', { className: 'kb-actions', style: { marginTop: '8px' } });
  const validateBtn = el('button', { className: 'kb-btn kb-btn--soft', onClick: () => { validationAttempted = true; render(); document.getElementById('idc-review-card').scrollIntoView({ block: 'end' }); } }, S('btn-validate'));
  validateBtn.disabled = unresolved > 0;
  actions.appendChild(validateBtn);

  const htmlBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: () => generateHtml() }, S('btn-download-html'));
  htmlBtn.disabled = !ready;
  actions.append(el('div', { className: 'spacer' }), htmlBtn);
  gate.appendChild(actions);

  if (validationAttempted) {
    const note = el('div', { className: 'kb-note ' + (ready ? 'kb-note--success' : 'kb-note--warning'), style: { marginTop: '10px' } });
    note.innerHTML = '<span>' + (ready ? '✓' : '⚠') + '</span><div>'
      + (ready ? S('validation-success') : S('validation-warning', { n: unreviewed })) + '</div>';
    gate.appendChild(note);
  }

  gate.appendChild(el('div', { className: 'kb-actbar', style: { marginTop: '10px' } },
    el('button', { className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: () => { resetExtraction(); render(); } }, S('start-over'))));
  card.appendChild(gate);
  return card;
}

function reviewRow(r, i) {
  const isPhoto = r.type === 'photo';
  const row = el('div', { className: 'idc-fieldrow' + (isPhoto ? ' idc-photorow' : '') + (r.conflict && !r.resolved ? ' is-conflict' : '') });

  // col 1: region / photo preview (click to zoom)
  const imgCol = el('div');
  const src = (r.type === 'photo' && r.photoDataUrl) ? r.photoDataUrl : r.regionDataUrl;
  const thumb = el('img', { className: (r.type === 'photo' && r.photoDataUrl) ? 'idc-photoimg' : 'idc-regimg',
    src, title: S('zoom-hint'), onClick: () => openLightbox(src, r.label) });
  thumb.style.cursor = 'zoom-in';
  imgCol.appendChild(thumb);
  row.appendChild(imgCol);

  // col 2: label + value / candidates
  const mid = el('div');
  mid.appendChild(el('div', { className: 'idc-flabel', style: { marginBottom: '4px' } }, r.label));

  if (r.type === 'photo') {
    mid.appendChild(el('p', { className: 'idc-muted' }, r.photoDataUrl ? '' : S('photo-missing')));
  } else if (r.conflict && !r.resolved) {
    mid.appendChild(el('p', { className: 'idc-muted' }, S('conflict-note')));
    const cand = el('div', { className: 'idc-cand' });
    cand.append(
      candBtn(S('source-ocr'), r.ocrValue, () => resolveField(i, r.ocrValue)),
      candBtn(S('source-qr'), r.qrValue, () => resolveField(i, r.qrValue))
    );
    mid.appendChild(cand);
    const input = el('input', { className: 'kb-input', placeholder: S('col-value'), value: '' });
    input.addEventListener('input', () => { if (input.value.trim()) resolveField(i, input.value, true); });
    mid.appendChild(input);
  } else {
    // For date fields show the raw extracted text above the editable interpreted date.
    if (r.type === 'date' && r.dateText && r.dateText !== r.value) {
      mid.appendChild(el('div', { className: 'idc-muted', style: { fontSize: 'var(--fs-small)', marginBottom: '3px' } },
        S('date-extracted') + ': ' + r.dateText));
    }
    const input = el('input', { className: 'kb-input', value: r.value || '' });
    input.addEventListener('input', () => { r.value = input.value; });
    mid.appendChild(input);
    if (r.qrValue && !r.conflict) mid.appendChild(el('div', { className: 'idc-muted', style: { marginTop: '3px' } }, S('source-qr') + ': ' + r.qrValue));
  }
  row.appendChild(mid);

  // col 3: reviewed toggle — defaults to unreviewed; must be confirmed (every
  // field, incl. photos) before the Validate button will pass.
  const rev = el('span', { className: 'idc-review ' + (r.reviewed ? 'is-ok' : 'is-no') });
  rev.append(el('span', null, S('reviewed-label') + ':'), el('span', { className: 'mark' }, r.reviewed ? '✓' : '✗'));
  rev.style.cursor = 'pointer';
  rev.addEventListener('click', () => { if (r.conflict && !r.resolved) return; r.reviewed = !r.reviewed; render(); });
  row.appendChild(rev);
  return row;
}

function candBtn(srcLabel, value, onClick) {
  const b = el('button', { className: 'kb-btn kb-btn--ghost', onClick });
  b.append(el('span', { className: 'src' }, srcLabel), el('span', null, value || S('field-empty')));
  return b;
}
function resolveField(i, value, fromInput) {
  const r = results[i];
  r.value = value; r.conflict = false; r.resolved = true; r.reviewed = true;
  if (!fromInput) render();
}

/* ── Expiry computation ──────────────────────────────────────────────────── */
function expiryInfo() {
  const ef = tpl['expiry-field'];
  if (!ef) return { hasField: false };
  const r = results.find(x => x.side === ef.side && x.id === ef.id);
  if (!r) return { hasField: false };
  const iso = normaliseDate(r.value, r.calendar);
  if (!iso) return { hasField: true, recognised: false, raw: r.value };
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(iso + 'T00:00:00');
  return { hasField: true, recognised: true, iso, expired: exp < today };
}

/* ── filename ────────────────────────────────────────────────────────────── */
function bestName() {
  const byId = id => { const r = results.find(x => x.id === id && x.value); return r ? r.value : ''; };
  let v = results.find(r => /name/i.test(r.id) && r.value);
  if (v) return v.value;
  v = results.find(r => /(^|[-_])id($|[-_])|number/i.test(r.id) && r.value);
  if (v) return v.value;
  return tpl.slug;
}
function outputFilename(ext) {
  const today = new Date().toISOString().slice(0, 10);
  const namePart = bestName().replace(/[^\p{L}\p{N}]+/gu, '-').replace(/(^-|-$)/g, '').slice(0, 40) || tpl.slug;
  return `${tpl.slug}-${namePart}-${today}.${ext}`;
}

/* ── HTML output — standalone record, live expiry re-check, COPY buttons ─── */
function generateHtml() {
  const exp = expiryInfo();
  const genDate = new Date().toISOString().slice(0, 10);
  const fields = results.filter(r => r.type !== 'photo').map(r => {
    let display = r.value || '';
    if (r.type === 'date') { const iso = normaliseDate(r.value, r.calendar); if (iso) display = iso; }
    return { label: r.label, value: display, type: r.type };
  });
  // Photos: the first photo field is the primary; any further photo fields plus
  // the front/back card scans go in the "Images" section at the bottom.
  const photoFields = results.filter(r => r.type === 'photo' && r.photoDataUrl);
  const primary = photoFields[0] || null;
  const extras = [];
  photoFields.slice(1).forEach(p => extras.push({ src: p.photoDataUrl, label: p.label }));
  if (sideCanvas.front) extras.push({ src: sideCanvas.front.toDataURL('image/jpeg', 0.72), label: S('step-front') });
  if (sideCanvas.back) extras.push({ src: sideCanvas.back.toDataURL('image/jpeg', 0.72), label: S('step-back') });

  const data = {
    docType: tpl.name || tpl.slug,
    generated: genDate,
    expiryIso: exp.recognised ? exp.iso : null,
    expiryHasField: !!exp.hasField,
    expiryRecognised: !!exp.recognised,
    fields,
    rawQr: { front: rawQr.front, back: rawQr.back },
  };
  const strings = {
    title: S('output-title'), generatedOn: S('generated-on'),
    valid: S('valid-banner'), expired: S('expired-banner'),
    validAsof: S('valid-asof', { date: '%D' }), expiredAsof: S('expired-asof', { date: '%D' }),
    unknown: S('expiry-unknown'), noField: S('no-expiry-field'),
    copy: S('copy'), copied: S('copied'), rawQr: S('raw-qr-label'),
    empty: S('field-empty'), recheck: S('live-recheck-note'),
    images: S('images-section'), zoomHint: S('zoom-hint'),
  };
  const html = buildStandaloneHtml(data, strings, {
    primaryImg: primary ? primary.photoDataUrl : null,
    primaryLabel: primary ? primary.label : '',
    extras,
  });
  downloadBlob(html, outputFilename('html'), 'text/html');
}

/* Build a self-contained HTML record. No bizdocs chrome (decision 16): a few
 * inline styles, the data as JSON, images as data URIs, and one small script
 * that (a) re-computes valid/expired from new Date() on every load and
 * (b) wires a one-click COPY button onto every field value. */
function buildStandaloneHtml(data, strings, imgs) {
  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const accent = CFG['accent-colour'] || '#2f6fed';
  const fieldRows = data.fields.map((f, i) => `
      <div class="row">
        <div class="lab">${esc(f.label)}</div>
        <div class="valwrap">
          <span class="val" id="v${i}">${esc(f.value) || '<span class=empty>' + esc(strings.empty) + '</span>'}</span>
          ${f.value ? `<button class="copy" data-copy="v${i}" aria-label="${esc(strings.copy)} ${esc(f.label)}">${esc(strings.copy)}</button>` : ''}
        </div>
      </div>`).join('');
  const primaryBlock = imgs.primaryImg
    ? `<div class="topphoto"><img class="zoom" src="${imgs.primaryImg}" alt="${esc(imgs.primaryLabel)}" title="${esc(strings.zoomHint)}"></div>` : '';
  const extras = imgs.extras || [];
  const imagesSection = extras.length ? `
    <div class="images">
      <h2>${esc(strings.images)}</h2>
      <div class="thumbs">
        ${extras.map(im => `<figure class="thumb"><img class="zoom" src="${im.src}" alt="${esc(im.label)}" title="${esc(strings.zoomHint)}"><figcaption class="cap">${esc(im.label)}</figcaption></figure>`).join('')}
      </div>
    </div>` : '';
  const rawQrBlock = (data.rawQr.front || data.rawQr.back) ? `
    <details class="qr"><summary>${esc(strings.rawQr)}</summary>
      ${['front', 'back'].filter(s => data.rawQr[s]).map(s => `<div class="qrrow"><b>${s}</b>: <code>${esc(data.rawQr[s])}</code></div>`).join('')}
    </details>` : '';

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${esc(strings.title)} — ${esc(data.docType)}</title>
<style>
  :root { --accent:${accent}; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    margin:0; padding:28px; color:#14181e; background:#f4f6fa; line-height:1.5; }
  .doc { max-width:760px; margin:0 auto; background:#fff; border:1px solid #e3e7ee; border-radius:10px;
    box-shadow:0 4px 18px rgba(20,24,30,.06); padding:28px 30px; }
  h1 { font-size:20px; margin:0 0 2px; }
  .sub { color:#5f6975; font-size:13px; margin-bottom:16px; }
  .banner { display:inline-block; font-weight:700; color:#fff; padding:8px 16px; border-radius:6px;
    font-size:14px; letter-spacing:.02em; }
  .top { display:flex; gap:20px; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
  .topmain { min-width:0; }
  .topphoto img { max-width:150px; max-height:200px; border-radius:8px; border:1px solid #e3e7ee; }
  .images { margin-top:24px; padding-top:16px; border-top:1px solid #eef1f5; }
  .images h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:#5f6975; margin:0 0 10px; }
  .thumbs { display:flex; gap:14px; flex-wrap:wrap; }
  .thumb { margin:0; text-align:center; }
  .thumb img { max-width:240px; max-height:170px; border-radius:6px; border:1px solid #e3e7ee; display:block; }
  .thumb .cap { font-size:11px; color:#5f6975; margin-top:4px; }
  .zoom { cursor:zoom-in; }
  .lb { position:fixed; inset:0; background:rgba(10,12,16,.85); display:none; align-items:center;
    justify-content:center; padding:24px; cursor:zoom-out; z-index:50; }
  .lb img { max-width:96vw; max-height:92vh; border-radius:6px; box-shadow:0 10px 40px rgba(0,0,0,.5); }
  .row { display:grid; grid-template-columns:200px 1fr; gap:14px; padding:9px 0; border-top:1px solid #eef1f5; }
  .row:first-of-type { border-top:0; }
  .lab { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#5f6975; padding-top:3px; }
  .valwrap { display:flex; align-items:center; justify-content:space-between; gap:10px; min-width:0; }
  .val { font-size:16px; word-break:break-word; }
  .empty { color:#9aa3af; font-style:italic; }
  .copy { flex:0 0 auto; cursor:pointer; border:1px solid #d3d9e2; background:#f4f7fb; color:#3a434f;
    border-radius:6px; padding:4px 10px; font-size:12px; font-weight:600; }
  .copy:hover { border-color:var(--accent); color:var(--accent); }
  .copy.done { background:var(--accent); color:#fff; border-color:var(--accent); }
  .qr { margin-top:18px; font-size:13px; }
  .qr summary { cursor:pointer; color:#5f6975; }
  .qrrow { margin-top:6px; word-break:break-all; }
  code { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; }
  .foot { margin-top:22px; padding-top:14px; border-top:1px solid #eef1f5; font-size:11px; color:#9aa3af; }
  @media print { body { background:#fff; padding:0; } .doc { box-shadow:none; border:0; } .copy { display:none; } }
</style>
</head>
<body>
<div class="doc">
  <div class="top">
    <div class="topmain">
      <h1>${esc(strings.title)}</h1>
      <div class="sub">${esc(data.docType)} · ${esc(strings.generatedOn)} ${esc(data.generated)}</div>
      <div class="banner" id="banner">…</div>
    </div>
    ${primaryBlock}
  </div>
  <div class="fields">${fieldRows}</div>
  ${imagesSection}
  ${rawQrBlock}
  <div class="foot">${esc(strings.recheck)}</div>
</div>
<div class="lb" id="lb"><img alt=""></div>
<script id="record-data" type="application/json">${JSON.stringify({ expiryIso: data.expiryIso, expiryHasField: data.expiryHasField, expiryRecognised: data.expiryRecognised }).replace(/</g, '\\u003c')}<\/script>
<script>
(function(){
  var D = JSON.parse(document.getElementById('record-data').textContent);
  var T = ${JSON.stringify(strings)};
  // (a) Re-check expiry against today's date, every time the file is opened.
  var b = document.getElementById('banner');
  function fmt(t, d){ return t.replace('%D', d); }
  if (!D.expiryHasField) { b.textContent = T.noField; b.style.background = '#5f6975'; }
  else if (!D.expiryRecognised || !D.expiryIso) { b.textContent = T.unknown; b.style.background = '#c9851f'; }
  else {
    var today = new Date(); today.setHours(0,0,0,0);
    var exp = new Date(D.expiryIso + 'T00:00:00');
    if (exp < today) { b.textContent = T.expired + ' — ' + fmt(T.expiredAsof, D.expiryIso); b.style.background = '#d64545'; }
    else { b.textContent = T.valid + ' — ' + fmt(T.validAsof, new Date().toISOString().slice(0,10)); b.style.background = '#1f9d5f'; }
  }
  // (b) One-click copy on every field value.
  document.querySelectorAll('.copy').forEach(function(btn){
    btn.addEventListener('click', function(){
      var el = document.getElementById(btn.getAttribute('data-copy'));
      var text = el ? el.innerText : '';
      var done = function(){ var o = btn.textContent; btn.textContent = T.copied; btn.classList.add('done');
        setTimeout(function(){ btn.textContent = T.copy; btn.classList.remove('done'); }, 1200); };
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(done, fallback); }
      else fallback();
      function fallback(){ var r = document.createRange(); r.selectNode(el);
        var sel = getId(); sel.removeAllRanges(); sel.addRange(r);
        try { document.execCommand('copy'); done(); } catch(e){} sel.removeAllRanges(); }
      function getId(){ return window.getSelection(); }
    });
  });
  // (c) Click any photo to expand it full-screen.
  var lb = document.getElementById('lb'), lbImg = lb.querySelector('img');
  document.querySelectorAll('img.zoom').forEach(function(img){
    img.addEventListener('click', function(){ lbImg.src = img.src; lb.style.display = 'flex'; });
  });
  lb.addEventListener('click', function(){ lb.style.display = 'none'; lbImg.src = ''; });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') { lb.style.display = 'none'; lbImg.src = ''; } });
})();
<\/script>
</body>
</html>`;
}

/* ── helpers ─────────────────────────────────────────────────────────────── */
function noteErr(msg) { const n = el('div', { className: 'kb-note kb-note--error' }); n.innerHTML = '<span>⚠</span><div>' + msg + '</div>'; return n; }
function openLightbox(src, caption) {
  const ov = el('div', { className: 'idc-lightbox' });
  ov.appendChild(el('img', { src }));
  if (caption) ov.appendChild(el('div', { className: 'cap' }, caption));
  const close = () => { ov.remove(); document.removeEventListener('keydown', onKey); };
  const onKey = e => { if (e.key === 'Escape') close(); };
  ov.addEventListener('click', close);
  document.addEventListener('keydown', onKey);
  document.body.appendChild(ov);
}
function downloadBlob(content, filename, type) {
  const url = URL.createObjectURL(new Blob([content], { type }));
  const a = el('a', { href: url, download: filename }); document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function loadTemplates() {
  manifest = []; templateList = []; templateErrors = [];
  try {
    const res = await fetch('templates/manifest.json?_=' + Date.now());
    if (!res.ok) { templateErrors.push('manifest.json: HTTP ' + res.status); }
    else { manifest = await res.json(); }
  } catch (e) { templateErrors.push('manifest.json: ' + e.message); }
  if (!Array.isArray(manifest)) { templateErrors.push('manifest.json is not a JSON array of filenames'); manifest = []; }

  for (const file of manifest) {
    try {
      const r = await fetch('templates/' + file + '?_=' + Date.now());
      if (!r.ok) { templateErrors.push(file + ': HTTP ' + r.status + ' — file missing or the name in manifest.json doesn’t match the actual filename (check spelling, case, .yaml vs .yml)'); continue; }
      const text = await r.text();
      let data;
      try { data = jsyaml.load(text); }
      catch (pe) { templateErrors.push(file + ': YAML parse error — ' + pe.message); continue; }
      if (!data || typeof data !== 'object') {
        const looksHtml = typeof data === 'string' && /^\s*</.test(data);
        templateErrors.push(file + ': not a template' + (looksHtml ? ' (looks like an HTML page — served as a 404/fallback?)' : ' (parsed as ' + typeof data + ')'));
        continue;
      }
      if (!data.slug) templateErrors.push(file + ': missing "slug:" — using the filename');
      templateList.push({ file, name: data.name, slug: data.slug || file.replace(/\.ya?ml$/, ''), data });
    } catch (e) { templateErrors.push(file + ': ' + e.message); }
  }
  if (templateErrors.length) console.warn('[idcardreader] template issues:\n  ' + templateErrors.join('\n  '));
}

/* ── Boot ────────────────────────────────────────────────────────────────── */
try {
  CFG = await loadYamlConfig('config.yml?_=' + Date.now());   // bust caches so edits take effect
  assertConfig(CFG);
  normaliseConfig();
  applyAccent(CFG);
  initFontScale();
  lang = localStorage.getItem('idc-lang') || CFG['default-code'] || 'en';
  applyLang(lang);
  await loadTemplates();
  render();
} catch (e) {
  document.getElementById('app').innerHTML =
    `<div class="kb-wrap"><div class="kb-note kb-note--error"><span>⚠</span>` +
    `<div><b>Failed to load config.yml</b><br>${e.message}</div></div></div>`;
}
})();
</script>
</body>
</html>
