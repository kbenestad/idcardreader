# =============================================================================
# idcardreader — Configuration
# =============================================================================
# Standard bizdocs config header (kept from the basis starter) + a localisation
# block carrying every user-facing string for BOTH entry points: index.html
# (the extractor) and template.html (the template builder). Never hardcode a
# user-facing string in the page — add a key here and look it up via S().

# Organization
organization:                # leave blank to show the kBenestad wordmark
logo: no                     # yes|no — if yes, loads assets/logo.png or logo.jpg
logo-maxwidth: 4             # cm — maximum logo width on the PDF
tagline:                     # subtitle shown below the org name (falls back to ui.subtitle)

# Page setup
page-size: A4                # A4 or letter

# PDF output language: "default" (first defined language) or "user-selected" (follow the UI)
output-language: default

# Typography (PDF). Standard fonts: Helvetica, Times, Courier (+ Bold/Italic).
font-body: Helvetica
font-heading: Helvetica
font-monospace: Courier
font-size: 10

# Branding — overrides the --accent token for this app
accent-colour: "#2f6fed"

# OCR language(s) handed to Tesseract.js for text/date fields (e.g. eng, tha,
# eng+tha). Trained data downloads on first use and is cached by the browser.
ocr-language: eng

# ── Localisation ──────────────────────────────────────────────────────────────
localisation:
  default-language: en

  languages:
    - code: en
      name: English

  en:
    about:
      title: "About"
      button: "Close"
      content: |
        ### ID Card Reader
        A no-backend tool that extracts structured fields (text, dates, photo,
        QR) from photos or scans of ID documents, using per-document **templates**.

        - **This page** (index) is the extractor for daily use: pick a document
          type, capture the card, review the fields, and download a **PDF** and a
          standalone **HTML** record. The HTML wraps every value in a one-click
          **copy** button and re-checks the expiry date each time it is opened.
        - **template.html** is the setup-time builder: calibrate where each field
          sits on a card once, then export a template file.

        Everything runs in your browser — nothing is uploaded to a server.

        **Source:** [kbenestad/bizdocs](https://github.com/kbenestad/bizdocs)
